language: python            # this works for Linux but is an error on macOS or Windows
jobs:
  include:
    # - name: "Python 3.8.0 on Xenial Linux"
    #   python: 3.8           # this works for Linux but is ignored on macOS or Windows
    # - name: "Python 3.7.4 on macOS"
    #   os: osx
    #   osx_image: xcode11.2  # Python 3.7.4 running on macOS 10.14.4
    #   language: shell       # 'language: python' is an error on Travis CI macOS
    - name: "Python 3.6.0 on Windows"
      os: windows           # Windows 10.0.17134 N/A Build 17134
      language: shell       # 'language: python' is an error on Travis CI Windows
      before_install:
        - choco install python --version 3.6.0
      env: PATH=/c/Python36:/c/Python36/Scripts:$PATH
    - name: "Python 3.8.0 on Windows"
      os: windows           # Windows 10.0.17134 N/A Build 17134
      language: shell       # 'language: python' is an error on Travis CI Windows
      before_install:
        - choco install python --version 3.8.0
      env: PATH=/c/Python38:/c/Python38/Scripts:$PATH
install: 
  - powershell -Command Set-ItemProperty -Path REGISTRY::HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Policies\System -Name ConsentPromptBehaviorAdmin -Value 0
  - python -m pip install --upgrade pip # all three OSes agree about 'pip3'
  - python -m pip install pywinauto # Needed to install FEMM
  - python Tests/installation_femm.py
  - python -m pip install -r requirements.txt
  - python -m pip install .
# 'python' points to Python 2.7 on macOS but points to Python 3.8 on Linux and Windows
# 'python3' is a 'command not found' error on Windows but 'py' works on Windows only
script: python -m pytest Tests -m "not GMSH or not FEMM" -v --continue-on-collection-errors
